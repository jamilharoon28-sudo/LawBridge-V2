backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "pages"
    label: "Pages"
    folder: "src/content/pages"
    create: false
    slug: "{{slug}}"

    fields:
      - { label: "Title", name: "title", widget: "string" }

      - label: "Hero"
        name: "hero"
        widget: "object"
        required: false
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string", required: false }
          - { label: "Heading", name: "heading", widget: "string", required: false }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Primary Button Text", name: "primaryButtonText", widget: "string", required: false }
          - { label: "Primary Button Link", name: "primaryButtonLink", widget: "string", required: false }
          - { label: "Secondary Button Text", name: "secondaryButtonText", widget: "string", required: false }
          - { label: "Secondary Button Link", name: "secondaryButtonLink", widget: "string", required: false }
          - { label: "Tertiary Button Text", name: "tertiaryButtonText", widget: "string", required: false }
          - { label: "Tertiary Button Link", name: "tertiaryButtonLink", widget: "string", required: false }

      - label: "Sections"
        name: "sections"
        widget: "object"
        required: false
        fields:
          - label: "Problem Section"
            name: "problem"
            widget: "object"
            required: false
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string", required: false }
              - { label: "Heading", name: "heading", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }

          - label: "Method Section"
            name: "method"
            widget: "object"
            required: false
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string", required: false }
              - { label: "Heading", name: "heading", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }

          - label: "Curriculum Section"
            name: "curriculum"
            widget: "object"
            required: false
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string", required: false }
              - { label: "Heading", name: "heading", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }

          - label: "Pathways Section"
            name: "pathways"
            widget: "object"
            required: false
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string", required: false }
              - { label: "Heading", name: "heading", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }

          - label: "CTA Section"
            name: "cta"
            widget: "object"
            required: false
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string", required: false }
              - { label: "Heading", name: "heading", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }

      - label: "Cards"
        name: "cards"
        widget: "object"
        required: false
        fields:
          - label: "Problem Cards"
            name: "problem"
            widget: "list"
            required: false
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

          - label: "Method Cards"
            name: "method"
            widget: "list"
            required: false
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

          - label: "Curriculum Cards"
            name: "curriculum"
            widget: "list"
            required: false
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

          - label: "Pathway Cards"
            name: "pathways"
            widget: "list"
            required: false
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Button Text", name: "buttonText", widget: "string", required: false }
              - { label: "Button Link", name: "buttonLink", widget: "string", required: false }

      - label: "CTA Buttons"
        name: "buttons"
        widget: "object"
        required: false
        fields:
          - label: "CTA"
            name: "cta"
            widget: "object"
            required: false
            fields:
              - { label: "Primary Text", name: "primaryText", widget: "string", required: false }
              - { label: "Primary Link", name: "primaryLink", widget: "string", required: false }
              - { label: "Secondary Text", name: "secondaryText", widget: "string", required: false }
              - { label: "Secondary Link", name: "secondaryLink", widget: "string", required: false }

  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Date", name: "date", widget: "datetime", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "webinars"
    label: "Webinars"
    folder: "src/content/webinars"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Date", name: "date", widget: "datetime", required: false }
      - { label: "Status", name: "status", widget: "string", required: false }
      - { label: "Location", name: "location", widget: "string", required: false }

  - name: "workshops"
    label: "Workshops"
    folder: "src/content/workshops"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Date", name: "date", widget: "datetime", required: false }
      - { label: "Status", name: "status", widget: "string", required: false }
      - { label: "Location", name: "location", widget: "string", required: false }

  - name: "resources"
    label: "Resources"
    folder: "src/content/resources"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Type", name: "type", widget: "string", required: false }
