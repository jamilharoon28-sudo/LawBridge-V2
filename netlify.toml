[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
  force = true

[[redirects]]
  from = "/cms"
  to = "/cms/"
  status = 301
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = true
  conditions = { Role = ["admin"] }

[[redirects]]
  from = "/cms/*"
  to = "/cms/:splat"
  status = 200
  force = true
  conditions = { Role = ["admin"] }

[[redirects]]
  from = "/admin/*"
  to = "/login/"
  status = 401
  force = true

[[redirects]]
  from = "/cms/*"
  to = "/login/"
  status = 401
  force = true
